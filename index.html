<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Space Drawer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Instrument+Serif&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #aaa;
  font-family: 'DM Mono', monospace;
  overflow: hidden;
  height: 100vh;
  cursor: none;
}

#canvas-container {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.ui-panel {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}

.ui-panel > * { pointer-events: auto; }

.panel-left {
  top: 24px;
  left: 24px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.panel-right {
  top: 24px;
  right: 24px;
  width: 220px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.panel-bottom {
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  align-items: center;
}

.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  color: #fff;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
  user-select: none;
}

.logo span { color: #555; font-size: 14px; font-family: 'DM Mono', monospace; }

.tool-btn {
  width: 40px;
  height: 40px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  color: #777;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.tool-btn:hover { background: rgba(255,255,255,0.08); color: #ccc; border-color: rgba(255,255,255,0.15); }
.tool-btn.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.25); box-shadow: 0 0 20px rgba(255,255,255,0.05); }

.control-group {
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.control-group:first-of-type { border-radius: 10px 10px 4px 4px; }
.control-group:last-of-type { border-radius: 4px 4px 10px 10px; }
.control-group:not(:first-of-type):not(:last-of-type) { border-radius: 4px; }
.control-group:only-of-type { border-radius: 10px; }

.control-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #555;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.control-value {
  color: #888;
  font-size: 10px;
  letter-spacing: 0;
  text-transform: none;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  outline: none;
  margin: 4px 0;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  border: none;
  box-shadow: 0 0 10px rgba(255,255,255,0.3);
}

input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  border: none;
}

.color-row {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}

.color-swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
}

.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.2); }

.bottom-btn {
  height: 36px;
  padding: 0 16px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  color: #777;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  white-space: nowrap;
}

.bottom-btn:hover { background: rgba(255,255,255,0.08); color: #ccc; }

.hint {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: #333;
  letter-spacing: 0.5px;
  z-index: 10;
  transition: opacity 0.5s;
  pointer-events: none;
  text-align: center;
}

.particle-count {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: #333;
  letter-spacing: 1px;
  z-index: 10;
  pointer-events: none;
}

.mode-indicator {
  position: fixed;
  bottom: 68px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: #444;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="canvas-container"></div>
<canvas id="cursor-overlay" style="position:fixed;inset:0;z-index:5;pointer-events:none;"></canvas>

<div class="particle-count" id="pcount"></div>
<div class="mode-indicator" id="modeLabel">draw mode</div>
<div class="hint" id="hint">click + drag to draw &nbsp;·&nbsp; shift + drag to orbit &nbsp;·&nbsp; scroll to zoom</div>

<div class="ui-panel panel-left">
  <div class="logo">Nebula <span>drawer</span></div>
  <button class="tool-btn active" id="btnDraw" title="Draw (D)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
  </button>
  <button class="tool-btn" id="btnOrbit" title="Navigate (Space)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><ellipse cx="12" cy="12" rx="4" ry="10"/></svg>
  </button>
  <button class="tool-btn" id="btnErase" title="Erase (E)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 20H7L3 16l9-9 8 8-4 5z"/><path d="M6 11l8 8"/></svg>
  </button>
</div>

<div class="ui-panel panel-right">
  <div class="control-group">
    <div class="control-label">Particle density <span class="control-value" id="densityV">60</span></div>
    <input type="range" id="density" min="5" max="200" value="60" step="5">
  </div>
  <div class="control-group">
    <div class="control-label">Splatter radius <span class="control-value" id="splatV">25</span></div>
    <input type="range" id="splat" min="2" max="80" value="25">
  </div>
  <div class="control-group">
    <div class="control-label">Depth scatter <span class="control-value" id="depthV">30</span></div>
    <input type="range" id="depth" min="0" max="100" value="30">
  </div>
  <div class="control-group">
    <div class="control-label">Particle size <span class="control-value" id="sizeV">2.0</span></div>
    <input type="range" id="psize" min="3" max="40" value="20" step="1">
  </div>
  <div class="control-group">
    <div class="control-label">Opacity <span class="control-value" id="opacV">0.8</span></div>
    <input type="range" id="opac" min="10" max="100" value="80">
  </div>
  <div class="control-group">
    <div class="control-label">Color</div>
    <div class="color-row">
      <div class="color-swatch active" data-color="#ffffff" style="background:#ffffff"></div>
      <div class="color-swatch" data-color="#7eb4ff" style="background:#7eb4ff"></div>
      <div class="color-swatch" data-color="#ff6b6b" style="background:#ff6b6b"></div>
      <div class="color-swatch" data-color="#ffd93d" style="background:#ffd93d"></div>
      <div class="color-swatch" data-color="#6bffb8" style="background:#6bffb8"></div>
      <div class="color-swatch" data-color="#c77dff" style="background:#c77dff"></div>
    </div>
  </div>
</div>

<div class="ui-panel panel-bottom">
  <button class="bottom-btn" id="btnClear">Clear all</button>
  <button class="bottom-btn" id="btnUndo">Undo</button>
  <button class="bottom-btn" id="btnExplode">Explode</button>
  <button class="bottom-btn" id="btnGravity">Gravity</button>
  <button class="bottom-btn" id="btnDownload" style="border-color: rgba(255,255,255,0.15);">↓ Save PNG</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 0, 150);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
container.appendChild(renderer.domElement);

// Stars background
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount * 3);
const starAlpha = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random() - 0.5) * 1600;
  starPos[i*3+1] = (Math.random() - 0.5) * 1600;
  starPos[i*3+2] = (Math.random() - 0.5) * 1600;
  starAlpha[i] = 0.1 + Math.random() * 0.5;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('alpha', new THREE.BufferAttribute(starAlpha, 1));
const starMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float alpha;
    varying float vAlpha;
    void main() {
      vAlpha = alpha;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = 1.5;
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `
    varying float vAlpha;
    uniform float uTime;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      if (d > 1.0) discard;
      float a = vAlpha * (1.0 - d * d) * (0.7 + 0.3 * sin(uTime * 0.5 + vAlpha * 20.0));
      gl_FragColor = vec4(1.0, 1.0, 1.0, a);
    }`
});
scene.add(new THREE.Points(starGeo, starMat));

// Particle system for drawn strokes
const MAX_PARTICLES = 500000;
const positions = new Float32Array(MAX_PARTICLES * 3);
const colors = new Float32Array(MAX_PARTICLES * 3);
const sizes = new Float32Array(MAX_PARTICLES);
const alphas = new Float32Array(MAX_PARTICLES);
const velocities = new Float32Array(MAX_PARTICLES * 3);

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
geo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

const mat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute float size;
    attribute float alpha;
    attribute vec3 color;
    varying float vAlpha;
    varying vec3 vColor;
    void main() {
      vAlpha = alpha;
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (200.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `
    varying float vAlpha;
    varying vec3 vColor;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      if (d > 1.0) discard;
      float falloff = exp(-d * d * 3.0);
      gl_FragColor = vec4(vColor, vAlpha * falloff);
    }`
});

const points = new THREE.Points(geo, mat);
scene.add(points);

let particleCount = 0;
let strokeHistory = []; // array of { startIdx, count }
let currentStroke = null;

// State
let mode = 'draw'; // draw, orbit, erase
let drawColor = new THREE.Color('#ffffff');
let isDrawing = false;
let isOrbiting = false;
let lastMouse = { x: 0, y: 0 };
let physicsMode = null; // null, 'explode', 'gravity'

// Orbit controls (manual)
let spherical = { radius: 150, theta: 0, phi: Math.PI / 2 };
let target = new THREE.Vector3(0, 0, 0);

function updateCamera() {
  const r = spherical.radius;
  const t = spherical.theta;
  const p = spherical.phi;
  camera.position.set(
    target.x + r * Math.sin(p) * Math.sin(t),
    target.y + r * Math.cos(p),
    target.z + r * Math.sin(p) * Math.cos(t)
  );
  camera.lookAt(target);
}

function getDrawPlane() {
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  const plane = new THREE.Plane();
  plane.setFromNormalAndCoplanarPoint(dir.clone().negate(), target);
  return plane;
}

function screenToWorld(mx, my) {
  const ndc = new THREE.Vector2(
    (mx / window.innerWidth) * 2 - 1,
    -(my / window.innerHeight) * 2 + 1
  );
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(ndc, camera);
  const plane = getDrawPlane();
  const intersection = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, intersection);
  return intersection;
}

function addParticles(worldPos) {
  const density = +document.getElementById('density').value;
  const splat = +document.getElementById('splat').value;
  const depthScatter = +document.getElementById('depth').value / 100;
  const psize = +document.getElementById('psize').value / 10;
  const opac = +document.getElementById('opac').value / 100;

  const count = Math.floor(density * (0.5 + Math.random() * 0.5));
  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  const right = new THREE.Vector3();
  right.crossVectors(camDir, camera.up).normalize();
  const up = new THREE.Vector3();
  up.crossVectors(right, camDir).normalize();

  for (let i = 0; i < count && particleCount < MAX_PARTICLES; i++) {
    const idx = particleCount;
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.pow(Math.random(), 0.5) * splat;
    const dx = Math.cos(angle) * radius;
    const dy = Math.sin(angle) * radius;
    const dz = (Math.random() - 0.5) * splat * depthScatter * 2;

    positions[idx*3]   = worldPos.x + right.x * dx + up.x * dy + camDir.x * dz;
    positions[idx*3+1] = worldPos.y + right.y * dx + up.y * dy + camDir.y * dz;
    positions[idx*3+2] = worldPos.z + right.z * dx + up.z * dy + camDir.z * dz;

    colors[idx*3]   = drawColor.r;
    colors[idx*3+1] = drawColor.g;
    colors[idx*3+2] = drawColor.b;

    sizes[idx] = psize * (0.3 + Math.random() * 1.4);
    alphas[idx] = opac * (0.3 + Math.random() * 0.7);

    velocities[idx*3]   = 0;
    velocities[idx*3+1] = 0;
    velocities[idx*3+2] = 0;

    particleCount++;
  }

  if (currentStroke) currentStroke.count = particleCount - currentStroke.startIdx;

  geo.attributes.position.needsUpdate = true;
  geo.attributes.color.needsUpdate = true;
  geo.attributes.size.needsUpdate = true;
  geo.attributes.alpha.needsUpdate = true;
  geo.setDrawRange(0, particleCount);
}

function eraseNear(worldPos) {
  const eraseRadius = +document.getElementById('splat').value * 1.5;
  for (let i = 0; i < particleCount; i++) {
    const dx = positions[i*3] - worldPos.x;
    const dy = positions[i*3+1] - worldPos.y;
    const dz = positions[i*3+2] - worldPos.z;
    if (dx*dx + dy*dy + dz*dz < eraseRadius * eraseRadius) {
      alphas[i] *= 0.85;
      if (alphas[i] < 0.01) alphas[i] = 0;
    }
  }
  geo.attributes.alpha.needsUpdate = true;
}

// Events
const canvas = renderer.domElement;
let isShiftOrbiting = false;

canvas.addEventListener('mousedown', e => {
  if (e.button === 2 || (e.button === 0 && mode === 'orbit')) {
    isOrbiting = true;
    lastMouse = { x: e.clientX, y: e.clientY };
    return;
  }
  if (e.button === 0 && e.shiftKey) {
    isShiftOrbiting = true;
    lastMouse = { x: e.clientX, y: e.clientY };
    return;
  }
  if (e.button === 0 && mode === 'draw') {
    isDrawing = true;
    currentStroke = { startIdx: particleCount, count: 0 };
    const wp = screenToWorld(e.clientX, e.clientY);
    if (wp) addParticles(wp);
  }
  if (e.button === 0 && mode === 'erase') {
    isDrawing = true;
    const wp = screenToWorld(e.clientX, e.clientY);
    if (wp) eraseNear(wp);
  }
});

canvas.addEventListener('mousemove', e => {
  if (isOrbiting || isShiftOrbiting) {
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - dy * 0.005));
    lastMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
    return;
  }
  if (isDrawing && mode === 'draw') {
    const wp = screenToWorld(e.clientX, e.clientY);
    if (wp) addParticles(wp);
  }
  if (isDrawing && mode === 'erase') {
    const wp = screenToWorld(e.clientX, e.clientY);
    if (wp) eraseNear(wp);
  }
});

canvas.addEventListener('mouseup', () => {
  isOrbiting = false;
  isShiftOrbiting = false;
  if (isDrawing && currentStroke && currentStroke.count > 0) {
    strokeHistory.push(currentStroke);
  }
  isDrawing = false;
  currentStroke = null;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  spherical.radius = Math.max(20, Math.min(800, spherical.radius + e.deltaY * 0.15));
  updateCamera();
}, { passive: false });

canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch support
let lastTouch = null;
let lastTouchDist = null;

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    isOrbiting = true;
    isDrawing = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
    lastTouch = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
  } else if (e.touches.length === 1 && mode === 'draw') {
    isDrawing = true;
    currentStroke = { startIdx: particleCount, count: 0 };
    const wp = screenToWorld(e.touches[0].clientX, e.touches[0].clientY);
    if (wp) addParticles(wp);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && isOrbiting) {
    const cx = (e.touches[0].clientX + e.touches[1].clientX)/2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY)/2;
    if (lastTouch) {
      spherical.theta -= (cx - lastTouch.x) * 0.005;
      spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - (cy - lastTouch.y) * 0.005));
    }
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastTouchDist) spherical.radius = Math.max(20, Math.min(800, spherical.radius - (dist - lastTouchDist) * 0.5));
    lastTouchDist = dist;
    lastTouch = { x: cx, y: cy };
    updateCamera();
  } else if (e.touches.length === 1 && isDrawing) {
    const wp = screenToWorld(e.touches[0].clientX, e.touches[0].clientY);
    if (wp) addParticles(wp);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) { isOrbiting = false; lastTouchDist = null; lastTouch = null; }
  if (e.touches.length === 0) {
    if (isDrawing && currentStroke && currentStroke.count > 0) strokeHistory.push(currentStroke);
    isDrawing = false;
    currentStroke = null;
  }
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'd' || e.key === 'D') setMode('draw');
  if (e.key === 'e' || e.key === 'E') setMode('erase');
  if (e.key === ' ') { e.preventDefault(); setMode('orbit'); }
  if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) undo();
});

function setMode(m) {
  mode = m;
  document.getElementById('btnDraw').classList.toggle('active', m === 'draw');
  document.getElementById('btnOrbit').classList.toggle('active', m === 'orbit');
  document.getElementById('btnErase').classList.toggle('active', m === 'erase');
  document.getElementById('modeLabel').textContent = m + ' mode';
}

// Tool buttons
document.getElementById('btnDraw').addEventListener('click', () => setMode('draw'));
document.getElementById('btnOrbit').addEventListener('click', () => setMode('orbit'));
document.getElementById('btnErase').addEventListener('click', () => setMode('erase'));

// Sliders
['density','splat','depth','psize','opac'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    const v = id === 'psize' ? (e.target.value / 10).toFixed(1) :
              id === 'opac' ? (e.target.value / 100).toFixed(1) :
              e.target.value;
    document.getElementById(id === 'psize' ? 'sizeV' : id === 'opac' ? 'opacV' : id+'V').textContent = v;
  });
});

// Color swatches
document.querySelectorAll('.color-swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    drawColor.set(s.dataset.color);
  });
});

// Bottom buttons
document.getElementById('btnClear').addEventListener('click', () => {
  particleCount = 0;
  strokeHistory = [];
  geo.setDrawRange(0, 0);
  physicsMode = null;
});

function undo() {
  if (strokeHistory.length === 0) return;
  const last = strokeHistory.pop();
  particleCount = last.startIdx;
  geo.setDrawRange(0, particleCount);
}
document.getElementById('btnUndo').addEventListener('click', undo);

document.getElementById('btnExplode').addEventListener('click', () => {
  physicsMode = physicsMode === 'explode' ? null : 'explode';
  for (let i = 0; i < particleCount; i++) {
    const dx = positions[i*3];
    const dy = positions[i*3+1];
    const dz = positions[i*3+2];
    const len = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
    velocities[i*3]   = (dx / len) * (0.5 + Math.random() * 1.5);
    velocities[i*3+1] = (dy / len) * (0.5 + Math.random() * 1.5);
    velocities[i*3+2] = (dz / len) * (0.5 + Math.random() * 1.5);
  }
});

document.getElementById('btnGravity').addEventListener('click', () => {
  physicsMode = physicsMode === 'gravity' ? null : 'gravity';
});

document.getElementById('btnDownload').addEventListener('click', () => {
  renderer.render(scene, camera);
  const link = document.createElement('a');
  link.download = 'nebula-' + Date.now() + '.png';
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
});

// Animation
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  starMat.uniforms.uTime.value = time;

  if (physicsMode === 'explode') {
    for (let i = 0; i < particleCount; i++) {
      positions[i*3]   += velocities[i*3];
      positions[i*3+1] += velocities[i*3+1];
      positions[i*3+2] += velocities[i*3+2];
      velocities[i*3]   *= 0.995;
      velocities[i*3+1] *= 0.995;
      velocities[i*3+2] *= 0.995;
    }
    geo.attributes.position.needsUpdate = true;
  }

  if (physicsMode === 'gravity') {
    for (let i = 0; i < particleCount; i++) {
      const dx = -positions[i*3];
      const dy = -positions[i*3+1];
      const dz = -positions[i*3+2];
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
      const force = 0.3 / (dist * 0.1 + 1);
      velocities[i*3]   += (dx / dist) * force;
      velocities[i*3+1] += (dy / dist) * force;
      velocities[i*3+2] += (dz / dist) * force;
      velocities[i*3]   *= 0.98;
      velocities[i*3+1] *= 0.98;
      velocities[i*3+2] *= 0.98;
      positions[i*3]   += velocities[i*3];
      positions[i*3+1] += velocities[i*3+1];
      positions[i*3+2] += velocities[i*3+2];
    }
    geo.attributes.position.needsUpdate = true;
  }

  document.getElementById('pcount').textContent = particleCount.toLocaleString() + ' particles';

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

updateCamera();
animate();

// Hide hint after first stroke
const hintEl = document.getElementById('hint');
canvas.addEventListener('mousedown', () => { hintEl.style.opacity = '0'; }, { once: true });

// Cursor overlay
const cursorCanvas = document.getElementById('cursor-overlay');
const cctx = cursorCanvas.getContext('2d');
let mouseX = -1000, mouseY = -1000;
let mouseOnCanvas = false;
let cursorAnimT = 0;

function resizeCursor() {
  cursorCanvas.width = window.innerWidth * (window.devicePixelRatio || 1);
  cursorCanvas.height = window.innerHeight * (window.devicePixelRatio || 1);
  cursorCanvas.style.width = window.innerWidth + 'px';
  cursorCanvas.style.height = window.innerHeight + 'px';
  cctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
}
resizeCursor();

window.addEventListener('resize', resizeCursor);

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
canvas.addEventListener('mouseenter', () => { mouseOnCanvas = true; });
canvas.addEventListener('mouseleave', () => { mouseOnCanvas = false; });

// Stable preview dots seeded per-frame-group
let previewDots = [];
let lastSplatVal = -1, lastDepthVal = -1;

function regeneratePreviewDots() {
  previewDots = [];
  for (let i = 0; i < 40; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.pow(Math.random(), 0.5);
    const dz = (Math.random() - 0.5) * 2;
    const sz = 0.3 + Math.random() * 1.2;
    const al = 0.15 + Math.random() * 0.35;
    previewDots.push({ a, r, dz, sz, al });
  }
}
regeneratePreviewDots();

function drawCursor() {
  requestAnimationFrame(drawCursor);
  cctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  if (!mouseOnCanvas) return;
  cursorAnimT += 0.03;

  // Shift-orbit indicator overrides normal cursor
  if (isShiftOrbiting) {
    cctx.save();
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    // Orbit arc at screen center
    cctx.strokeStyle = '#ffffff';
    cctx.globalAlpha = 0.12;
    cctx.lineWidth = 1;
    cctx.beginPath();
    cctx.arc(cx, cy, 40, 0, Math.PI * 2);
    cctx.stroke();
    // Rotating tick
    const tickAngle = -spherical.theta * 2;
    cctx.globalAlpha = 0.5;
    cctx.lineWidth = 2;
    cctx.beginPath();
    cctx.arc(cx, cy, 40, tickAngle - 0.15, tickAngle + 0.15);
    cctx.stroke();
    // Small cursor dot
    cctx.globalAlpha = 0.4;
    cctx.fillStyle = '#ffffff';
    cctx.beginPath();
    cctx.arc(mouseX, mouseY, 3, 0, Math.PI * 2);
    cctx.fill();
    cctx.restore();
    return;
  }

  const splatR = +document.getElementById('splat').value;
  const depthS = +document.getElementById('depth').value / 100;

  // Regenerate preview dots if settings change
  if (splatR !== lastSplatVal || depthS !== lastDepthVal) {
    lastSplatVal = splatR;
    lastDepthVal = depthS;
    regeneratePreviewDots();
  }

  // Convert splatter radius (world units) to screen pixels
  // Approximate: project a point at target + right*splatR vs target
  const fov = camera.fov * Math.PI / 180;
  const screenH = window.innerHeight;
  const dist = camera.position.distanceTo(target);
  const worldToScreen = screenH / (2 * dist * Math.tan(fov / 2));
  const screenR = splatR * worldToScreen;
  const depthRingR = splatR * depthS * worldToScreen;

  const activeColor = '#' + drawColor.getHexString();

  if (mode === 'draw') {
    // Outer splatter ring - dashed, breathing
    const breathe = 1 + Math.sin(cursorAnimT * 2) * 0.02;
    cctx.save();
    cctx.strokeStyle = activeColor;
    cctx.globalAlpha = 0.35 + Math.sin(cursorAnimT * 1.5) * 0.1;
    cctx.lineWidth = 1;
    cctx.setLineDash([4, 6]);
    cctx.lineDashOffset = -cursorAnimT * 12;
    cctx.beginPath();
    cctx.arc(mouseX, mouseY, screenR * breathe, 0, Math.PI * 2);
    cctx.stroke();
    cctx.setLineDash([]);

    // Depth scatter ring (if depth > 0)
    if (depthS > 0.05) {
      cctx.globalAlpha = 0.15;
      cctx.lineWidth = 0.5;
      cctx.setLineDash([2, 4]);
      cctx.lineDashOffset = cursorAnimT * 8;
      cctx.beginPath();
      cctx.arc(mouseX, mouseY, depthRingR * breathe, 0, Math.PI * 2);
      cctx.stroke();
      cctx.setLineDash([]);
    }

    // Preview scatter dots
    for (const dot of previewDots) {
      const px = mouseX + Math.cos(dot.a) * dot.r * screenR;
      const py = mouseY + Math.sin(dot.a) * dot.r * screenR;
      const pulse = 0.7 + 0.3 * Math.sin(cursorAnimT * 1.2 + dot.a * 3);
      cctx.globalAlpha = dot.al * pulse;
      cctx.fillStyle = activeColor;
      cctx.beginPath();
      cctx.arc(px, py, dot.sz * 1.2, 0, Math.PI * 2);
      cctx.fill();
    }

    // Center crosshair
    cctx.globalAlpha = 0.7;
    cctx.strokeStyle = activeColor;
    cctx.lineWidth = 1;
    cctx.beginPath();
    cctx.moveTo(mouseX - 6, mouseY);
    cctx.lineTo(mouseX - 2, mouseY);
    cctx.moveTo(mouseX + 2, mouseY);
    cctx.lineTo(mouseX + 6, mouseY);
    cctx.moveTo(mouseX, mouseY - 6);
    cctx.lineTo(mouseX, mouseY - 2);
    cctx.moveTo(mouseX, mouseY + 2);
    cctx.lineTo(mouseX, mouseY + 6);
    cctx.stroke();

    // Center dot
    cctx.globalAlpha = 0.9;
    cctx.fillStyle = activeColor;
    cctx.beginPath();
    cctx.arc(mouseX, mouseY, 1.5, 0, Math.PI * 2);
    cctx.fill();

    cctx.restore();
  } else if (mode === 'erase') {
    const eraseR = splatR * 1.5 * worldToScreen;
    cctx.save();
    cctx.strokeStyle = '#ff4444';
    cctx.globalAlpha = 0.4;
    cctx.lineWidth = 1.5;
    cctx.setLineDash([3, 5]);
    cctx.lineDashOffset = -cursorAnimT * 15;
    cctx.beginPath();
    cctx.arc(mouseX, mouseY, eraseR, 0, Math.PI * 2);
    cctx.stroke();

    // X in center
    cctx.setLineDash([]);
    cctx.globalAlpha = 0.6;
    cctx.lineWidth = 1;
    cctx.beginPath();
    cctx.moveTo(mouseX - 4, mouseY - 4);
    cctx.lineTo(mouseX + 4, mouseY + 4);
    cctx.moveTo(mouseX + 4, mouseY - 4);
    cctx.lineTo(mouseX - 4, mouseY + 4);
    cctx.stroke();
    cctx.restore();
  } else {
    // Orbit mode - simple circle
    cctx.save();
    cctx.strokeStyle = '#ffffff';
    cctx.globalAlpha = 0.25;
    cctx.lineWidth = 1;
    cctx.beginPath();
    cctx.arc(mouseX, mouseY, 8, 0, Math.PI * 2);
    cctx.stroke();
    cctx.globalAlpha = 0.5;
    cctx.fillStyle = '#ffffff';
    cctx.beginPath();
    cctx.arc(mouseX, mouseY, 1.5, 0, Math.PI * 2);
    cctx.fill();
    cctx.restore();
  }
}
drawCursor();
</script>
</body>
